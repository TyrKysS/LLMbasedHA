name: "HA Device Monitor"
description: >-
  Real-time dashboard zobrazující stav všech entit a zařízení v Home Assistant.
  Obsahuje živý přehled změn, filtrování podle domény, fulltextové vyhledávání
  a skupinování entit podle zařízení. Integruje LLM sieve — systém dynamického
  vážení entit kombinující statické doménové váhy (W), kritické třídy zařízení
  a dynamickou amplitudu změn (M_delta) pro prioritizaci entit předávaných
  LLM agentovi. Každá entita má skóre aktivity s 5minutovým oknem.
version: "1.2.3"
slug: "ha_device_monitor"
init: false

arch:
  - aarch64
  - amd64
  - armhf
  - armv7
  - i386

homeassistant_api: true
hassio_api: true
hassio_role: default
auth_api: true

ingress: true
ingress_port: 8099
panel_icon: mdi:monitor-dashboard
panel_title: "Device Monitor"

map:
  - config:rw
