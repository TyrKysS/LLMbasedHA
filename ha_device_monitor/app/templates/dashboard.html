<!DOCTYPE html>
<html lang="cs">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>HA Device Monitor</title>
  <style>
    :root {
      --bg: #0d1117;
      --surface: #161b22;
      --surface2: #21262d;
      --border: #30363d;
      --text: #e6edf3;
      --text-muted: #8b949e;
      --green: #3fb950;
      --red: #f85149;
      --blue: #58a6ff;
      --yellow: #d29922;
      --purple: #a371f7;
      --orange: #f0883e;
      --accent: #1f6feb;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      min-height: 100vh;
    }

    header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 16px 24px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    header h1 { font-size: 1.2rem; font-weight: 600; }

    #status-dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: var(--red);
      transition: background 0.3s;
    }
    #status-dot.connected { background: var(--green); }

    #entity-count {
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    #weight-indicator {
      display: flex;
      align-items: center;
      gap: 5px;
      padding: 4px 14px;
      border-radius: 20px;
      background: var(--surface2);
      border: 1px solid var(--border);
      margin-left: auto;
      user-select: none;
      cursor: pointer;
      transition: border-color 0.4s, background 0.15s;
    }
    #weight-indicator:hover { background: color-mix(in srgb, var(--surface2) 70%, var(--accent) 30%); }
    #weight-indicator.w-critical { border-color: var(--red); }
    #weight-indicator.w-presence { border-color: var(--yellow); }
    #weight-chevron {
      font-size: 0.6rem;
      color: var(--text-muted);
      margin-left: 2px;
      transition: transform 0.25s;
    }
    #weight-indicator.panel-open #weight-chevron { transform: rotate(180deg); }

    /* ── Weight breakdown panel ── */
    #weight-panel {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.3s ease;
    }
    #weight-panel.open { max-height: 700px; }

    .weight-panel-inner {
      padding: 16px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    .weight-panel-grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 24px;
    }

    .weight-tier-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding-bottom: 10px;
      margin-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }

    .weight-tier-title {
      font-size: 0.78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }
    .weight-tier-title.w-critical { color: var(--red); }
    .weight-tier-title.w-presence { color: var(--yellow); }
    .weight-tier-title.w-env      { color: var(--green); }

    .weight-tier-badge {
      font-size: 0.68rem;
      color: var(--text-muted);
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 1px 6px;
    }

    .weight-tier-subtotal {
      margin-left: auto;
      font-size: 0.88rem;
      font-weight: 700;
      font-variant-numeric: tabular-nums;
    }
    .weight-tier-subtotal.w-critical { color: var(--red); }
    .weight-tier-subtotal.w-presence { color: var(--yellow); }
    .weight-tier-subtotal.w-env      { color: var(--green); }

    .weight-tier-list {
      display: flex;
      flex-direction: column;
      gap: 3px;
      max-height: 240px;
      overflow-y: auto;
    }

    .weight-entity-item {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 0.82rem;
      padding: 3px 0;
      min-height: 24px;
      transition: opacity 0.3s;
    }
    .weight-entity-item.inactive { opacity: 0.3; }

    .weight-entity-dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    .weight-empty {
      font-size: 0.8rem;
      color: var(--text-muted);
      font-style: italic;
      padding: 4px 0;
    }

    .weight-more {
      font-size: 0.78rem;
      color: var(--text-muted);
      padding: 3px 0;
      margin-top: 2px;
    }

    .weight-env-bar {
      height: 6px;
      background: var(--surface2);
      border-radius: 3px;
      overflow: hidden;
      border: 1px solid var(--border);
      margin-bottom: 8px;
    }
    .weight-env-fill {
      height: 100%;
      background: var(--green);
      border-radius: 3px;
      transition: width 0.5s ease;
    }
    .weight-env-counts {
      font-size: 0.85rem;
      color: var(--text-muted);
    }
    .weight-env-counts strong { color: var(--green); }

    .weight-label {
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    #total-weight {
      font-weight: 800;
      font-size: 1rem;
      font-variant-numeric: tabular-nums;
      min-width: 2.5ch;
      text-align: right;
      transition: color 0.4s;
    }
    #total-weight.w-critical { color: var(--red); }
    #total-weight.w-presence { color: var(--yellow); }
    #total-weight.w-env      { color: var(--green); }

    @keyframes weightPulse {
      0%   { transform: scale(1); }
      40%  { transform: scale(1.35); }
      100% { transform: scale(1); }
    }
    #total-weight.pulse { animation: weightPulse 0.3s ease; }

    .w-badge {
      font-size: 0.58rem;
      font-weight: 700;
      padding: 1px 4px;
      border-radius: 3px;
      flex-shrink: 0;
      min-width: 22px;
      text-align: center;
      opacity: 0.28;
      transition: opacity 0.3s;
    }
    .w-badge.contributing { opacity: 1; }
    .w-badge.w-critical { color: var(--red);      background: color-mix(in srgb, transparent 82%, var(--red)); }
    .w-badge.w-presence { color: var(--yellow);   background: color-mix(in srgb, transparent 82%, var(--yellow)); }
    .w-badge.w-env      { color: var(--text-muted); background: var(--surface2); border: 1px solid var(--border); }

    #search {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--text);
      padding: 6px 12px;
      font-size: 0.9rem;
      width: 220px;
      outline: none;
    }
    #search:focus { border-color: var(--accent); }

    #domain-filter {
      display: flex;
      gap: 6px;
      padding: 12px 24px;
      flex-wrap: wrap;
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .filter-btn {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 20px;
      color: var(--text-muted);
      padding: 4px 12px;
      font-size: 0.8rem;
      cursor: pointer;
      transition: all 0.15s;
    }
    .filter-btn:hover { border-color: var(--blue); color: var(--text); }
    .filter-btn.active { background: var(--accent); border-color: var(--accent); color: #fff; }

    main {
      padding: 20px 24px;
      max-width: 1600px;
      margin: 0 auto;
    }

    #grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(380px, 1fr));
      gap: 12px;
    }

    /* ── Device card ── */
    .device-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .device-card:hover { border-color: var(--accent); }

    .device-header {
      padding: 12px 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 8px;
    }

    .device-name {
      font-size: 0.95rem;
      font-weight: 600;
      line-height: 1.3;
    }

    .device-meta {
      font-size: 0.72rem;
      color: var(--text-muted);
      margin-top: 2px;
    }

    .device-entity-count {
      background: var(--surface2);
      color: var(--text-muted);
      font-size: 0.72rem;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 10px;
      white-space: nowrap;
      flex-shrink: 0;
    }

    /* ── Entity rows ── */
    .entity-list {
      display: flex;
      flex-direction: column;
    }

    .entity-row {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 8px 16px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
      min-height: 38px;
    }
    .entity-row:last-child { border-bottom: none; }
    .entity-row:hover { background: var(--surface2); }

    @keyframes rowFlash {
      0%   { background: color-mix(in srgb, var(--surface) 70%, var(--yellow) 30%); }
      100% { background: transparent; }
    }
    .entity-row.updated { animation: rowFlash 0.7s ease; }

    .domain-badge {
      font-size: 0.62rem;
      font-weight: 600;
      padding: 2px 6px;
      border-radius: 4px;
      text-transform: uppercase;
      letter-spacing: 0.04em;
      white-space: nowrap;
      flex-shrink: 0;
    }

    .entity-name-col {
      flex: 1;
      font-size: 0.85rem;
      min-width: 0;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .entity-state-col {
      display: flex;
      align-items: center;
      justify-content: flex-end;
      font-size: 0.85rem;
      font-weight: 500;
      flex-shrink: 0;
      text-align: right;
    }

    .unit { font-size: 0.78rem; font-weight: 400; color: var(--text-muted); margin-left: 3px; }

    .pill {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 0.78rem;
      font-weight: 600;
    }
    .pill.on  { background: color-mix(in srgb, transparent 80%, var(--green)); color: var(--green); }
    .pill.off { background: color-mix(in srgb, transparent 80%, var(--text-muted)); color: var(--text-muted); }
    .pill.active   { background: color-mix(in srgb, transparent 80%, var(--blue)); color: var(--blue); }
    .pill.inactive { background: color-mix(in srgb, transparent 80%, var(--text-muted)); color: var(--text-muted); }

    .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; flex-shrink: 0; }

    /* ── Log panel ── */
    #log-panel {
      position: fixed;
      right: 0; top: 0; bottom: 0;
      width: 420px;
      background: var(--surface);
      border-left: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      transform: translateX(100%);
      transition: transform 0.25s ease;
      z-index: 200;
    }
    #log-panel.open { transform: translateX(0); }

    .log-header {
      padding: 16px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 10px;
    }
    .log-header h2 { font-size: 1rem; flex: 1; }

    #log-entries {
      flex: 1;
      overflow-y: auto;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .log-entry {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 8px 10px;
      font-size: 0.78rem;
      font-family: monospace;
      animation: slideIn 0.2s ease;
    }
    @keyframes slideIn {
      from { opacity: 0; transform: translateX(10px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    .log-ts { color: var(--text-muted); display: block; margin-bottom: 3px; }
    .log-entity { color: var(--blue); font-weight: bold; }
    .log-arrow { color: var(--text-muted); }
    .log-old { color: var(--red); }
    .log-new { color: var(--green); }

    #log-toggle {
      position: fixed;
      bottom: 24px;
      right: 24px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: 50%;
      width: 52px;
      height: 52px;
      font-size: 1.4rem;
      cursor: pointer;
      box-shadow: 0 4px 16px rgba(0,0,0,0.4);
      z-index: 300;
      transition: background 0.2s;
    }
    #log-toggle:hover { background: #388bfd; }

    #log-badge {
      position: absolute;
      top: -4px; right: -4px;
      background: var(--red);
      color: #fff;
      border-radius: 10px;
      font-size: 0.65rem;
      padding: 1px 5px;
      font-weight: bold;
      display: none;
    }

    .btn-icon {
      background: none;
      border: none;
      color: var(--text-muted);
      cursor: pointer;
      font-size: 1rem;
      padding: 4px;
    }
    .btn-icon:hover { color: var(--text); }

    #overlay {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 190;
      display: none;
    }
    #overlay.show { display: block; }
  </style>
</head>
<body>

<header>
  <div id="status-dot" title="WebSocket stav"></div>
  <h1>HA Device Monitor</h1>
  <input id="search" type="text" placeholder="Hledat zařízení nebo entitu..." autocomplete="off">
  <span id="entity-count"></span>
  <div id="weight-indicator" title="Klikni pro detail vah">
    <span class="weight-label">W</span>
    <span id="total-weight" class="w-env">0</span>
    <span id="weight-chevron">▼</span>
  </div>
</header>

<div id="weight-panel">
  <div class="weight-panel-inner">
    <div class="weight-panel-grid">
      <div class="weight-tier">
        <div class="weight-tier-header">
          <span class="weight-tier-title w-critical">Kritické</span>
          <span class="weight-tier-badge">W = 100</span>
          <span class="weight-tier-subtotal w-critical" id="critical-subtotal">∑ 0</span>
        </div>
        <div class="weight-tier-list" id="critical-list">
          <span class="weight-empty">Načítání…</span>
        </div>
      </div>
      <div class="weight-tier">
        <div class="weight-tier-header">
          <span class="weight-tier-title w-presence">Přítomnost &amp; interakce</span>
          <span class="weight-tier-badge">W = 10</span>
          <span class="weight-tier-subtotal w-presence" id="presence-subtotal">∑ 0</span>
        </div>
        <div class="weight-tier-list" id="presence-list">
          <span class="weight-empty">Načítání…</span>
        </div>
      </div>
      <div class="weight-tier">
        <div class="weight-tier-header">
          <span class="weight-tier-title w-env">Prostředí</span>
          <span class="weight-tier-badge">W = 1</span>
          <span class="weight-tier-subtotal w-env" id="env-subtotal">∑ 0</span>
        </div>
        <div class="weight-tier-list" id="env-list">
          <span class="weight-empty">Načítání…</span>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="domain-filter">
  <button class="filter-btn active" data-domain="all">Vše</button>
</div>

<main>
  <div id="grid"></div>
</main>

<div id="overlay"></div>

<div id="log-panel">
  <div class="log-header">
    <h2>Změny stavů</h2>
    <button class="btn-icon" id="clear-log" title="Vymazat log">🗑</button>
    <button class="btn-icon" id="close-log" title="Zavřít">✕</button>
  </div>
  <div id="log-entries"></div>
</div>

<button id="log-toggle" title="Zobrazit log změn">
  📋
  <span id="log-badge"></span>
</button>

<script>
  const devicesData = {{ devices | tojson }};
  const entityToDevice = {{ entity_to_device | tojson }};

  // Flat states map extracted from devicesData
  const states = {};
  for (const device of Object.values(devicesData)) {
    Object.assign(states, device.entities);
  }
  // Ensure __no_device__ entities are in entityToDevice
  for (const eid of Object.keys((devicesData['__no_device__'] || {}).entities || {})) {
    entityToDevice[eid] = '__no_device__';
  }

  let activeDomain = 'all';
  let searchTerm = '';
  let logOpen = false;
  let unreadCount = 0;
  let currentTotalWeight = 0;
  let weightPanelOpen = false;

  // ── Weight helpers ────────────────────────────────────────────────────────
  function weightClass(w) {
    return w >= 100 ? 'w-critical' : w >= 10 ? 'w-presence' : 'w-env';
  }

  function isEntityActive(domain, stateRaw) {
    if (stateRaw === 'unavailable' || stateRaw === 'unknown') return false;
    if (['binary_sensor','switch','light','input_boolean','fan','automation','script'].includes(domain))
      return stateRaw === 'on';
    if (domain === 'cover') return ['open','opening','closing'].includes(stateRaw);
    if (domain === 'media_player') return !['off','idle','standby'].includes(stateRaw);
    if (domain === 'alarm_control_panel') return stateRaw !== 'disarmed';
    if (domain === 'lock') return stateRaw === 'unlocked';
    if (domain === 'sensor') return !isNaN(parseFloat(stateRaw));
    return !['off','closed','idle','disarmed'].includes(stateRaw);
  }

  function updateWeightDisplay(weight) {
    const el = document.getElementById('total-weight');
    const ind = document.getElementById('weight-indicator');
    const changed = weight !== currentTotalWeight;
    currentTotalWeight = weight;
    el.textContent = weight;
    el.className = weightClass(weight);
    const indCls = weight >= 100 ? 'w-critical' : weight >= 10 ? 'w-presence' : '';
    ind.className = [indCls, weightPanelOpen ? 'panel-open' : ''].filter(Boolean).join(' ');
    if (changed) {
      el.classList.add('pulse');
      el.addEventListener('animationend', () => el.classList.remove('pulse'), { once: true });
    }
    renderWeightPanel();
  }

  function toggleWeightPanel() {
    weightPanelOpen = !weightPanelOpen;
    const panel = document.getElementById('weight-panel');
    const ind = document.getElementById('weight-indicator');
    panel.classList.toggle('open', weightPanelOpen);
    ind.classList.toggle('panel-open', weightPanelOpen);
    if (weightPanelOpen) renderWeightPanel();
  }

  function renderWeightPanel() {
    if (!weightPanelOpen) return;

    const critical = [], presence = [];
    let envActive = 0, envTotal = 0;

    for (const [, d] of Object.entries(states)) {
      const active = isEntityActive(d.domain, d.state_raw);
      const w = d.weight || 1;
      if (w >= 100) {
        critical.push({ name: d.friendly_name, active });
      } else if (w >= 10) {
        if (active) presence.push(d.friendly_name);
      } else {
        envTotal++;
        if (active) envActive++;
      }
    }

    critical.sort((a, b) => b.active - a.active || a.name.localeCompare(b.name, 'cs'));
    presence.sort((a, b) => a.localeCompare(b, 'cs'));

    const critSubtotal = critical.filter(e => e.active).length * 100;
    const presSubtotal = presence.length * 10;

    document.getElementById('critical-subtotal').textContent = `∑ ${critSubtotal}`;
    document.getElementById('presence-subtotal').textContent = `∑ ${presSubtotal}`;
    document.getElementById('env-subtotal').textContent = `∑ ${envActive}`;

    // Critical: show all, active highlighted, inactive dimmed
    const critList = document.getElementById('critical-list');
    if (critical.length === 0) {
      critList.innerHTML = '<span class="weight-empty">Žádný kritický senzor</span>';
    } else {
      critList.innerHTML = critical.map(e => `
        <div class="weight-entity-item${e.active ? '' : ' inactive'}">
          <span class="weight-entity-dot" style="background:${e.active ? 'var(--red)' : 'var(--border)'}"></span>
          <span>${e.name}</span>
        </div>`).join('');
    }

    // Presence: only active, max 12 with overflow
    const presList = document.getElementById('presence-list');
    if (presence.length === 0) {
      presList.innerHTML = '<span class="weight-empty">Žádný aktivní</span>';
    } else {
      const MAX = 12;
      const shown = presence.slice(0, MAX);
      const more = presence.length - MAX;
      presList.innerHTML = shown.map(name => `
        <div class="weight-entity-item">
          <span class="weight-entity-dot" style="background:var(--yellow)"></span>
          <span>${name}</span>
        </div>`).join('') +
        (more > 0 ? `<div class="weight-more">+ ${more} dalších aktivních</div>` : '');
    }

    // Environmental: progress bar + count
    const pct = envTotal > 0 ? Math.round(envActive / envTotal * 100) : 0;
    document.getElementById('env-list').innerHTML = `
      <div class="weight-env-bar"><div class="weight-env-fill" style="width:${pct}%"></div></div>
      <div class="weight-env-counts">
        <strong>${envActive}</strong> aktivních z <span>${envTotal}</span> celkem
        <span style="color:var(--text-muted);font-size:0.75rem"> (${pct} %)</span>
      </div>`;
  }

  // ── Domain color map ──────────────────────────────────────────────────────
  const domainColors = {
    light: '#d29922', switch: '#58a6ff', sensor: '#3fb950',
    binary_sensor: '#a371f7', climate: '#f0883e', media_player: '#f85149',
    cover: '#79c0ff', person: '#ffa657', weather: '#8b949e',
    automation: '#b3d4f5', script: '#b3d4f5', fan: '#56d364',
    input_boolean: '#58a6ff',
  };
  function domainColor(d) { return domainColors[d] || '#8b949e'; }

  function safeId(entityId) { return entityId.replace(/\./g, '_'); }

  // ── State rendering (compact row format) ──────────────────────────────────
  function renderRowState(d) {
    const disp = d.display;
    switch (disp.type) {
      case 'toggle': {
        const cls = disp.value ? 'on' : 'off';
        return `<span class="pill ${cls}"><span class="dot"></span>${disp.label}</span>`;
      }
      case 'binary': {
        const cls = disp.value ? 'active' : 'inactive';
        return `<span class="pill ${cls}"><span class="dot"></span>${disp.label}</span>`;
      }
      case 'value': {
        if (disp.value === 'unavailable' || disp.value === 'unknown') {
          return `<span style="color:var(--text-muted);font-size:0.78rem">${disp.value}</span>`;
        }
        return `<strong>${disp.value}</strong><span class="unit">${disp.unit}</span>`;
      }
      case 'climate':
        return `${disp.value}${disp.current_temp != null ? `<span class="unit"> · ${disp.current_temp} °C</span>` : ''}`;
      case 'cover':
        return `${disp.value}${disp.position != null ? `<span class="unit"> (${disp.position} %)</span>` : ''}`;
      case 'weather':
        return `${disp.value}${disp.temperature != null ? `<span class="unit"> · ${disp.temperature} °C</span>` : ''}`;
      case 'media':
        return `<span style="color:var(--text-muted)">${disp.value}</span>`;
      default:
        return `<span style="color:var(--text-muted)">${disp.value}</span>`;
    }
  }

  // ── Entity row ────────────────────────────────────────────────────────────
  function createEntityRow(entityId, d) {
    const row = document.createElement('div');
    row.className = 'entity-row';
    row.dataset.entityId = entityId;
    row.dataset.domain = d.domain;
    const color = domainColor(d.domain);
    const w = d.weight || 1;
    const wCls = weightClass(w);
    const contributing = isEntityActive(d.domain, d.state_raw);
    row.innerHTML = `
      <span class="domain-badge" style="background:color-mix(in srgb,var(--surface2) 50%,${color} 20%);color:${color}">${d.domain}</span>
      <span class="w-badge ${wCls}${contributing ? ' contributing' : ''}" title="Statická váha: ${w}">${w}</span>
      <span class="entity-name-col" title="${entityId}">${d.friendly_name}</span>
      <div class="entity-state-col" id="state-${safeId(entityId)}">${renderRowState(d)}</div>
    `;
    return row;
  }

  // ── Device card ───────────────────────────────────────────────────────────
  function createDeviceCard(deviceId, device) {
    const card = document.createElement('div');
    card.className = 'device-card';
    card.dataset.deviceId = deviceId;

    const metaParts = [device.manufacturer, device.model].filter(Boolean);
    const metaHtml = metaParts.length
      ? `<div class="device-meta">${metaParts.join(' · ')}</div>`
      : '';

    const sortedEntities = Object.entries(device.entities)
      .sort((a, b) => a[1].friendly_name.localeCompare(b[1].friendly_name, 'cs'));

    card.innerHTML = `
      <div class="device-header">
        <div>
          <div class="device-name">${device.name}</div>
          ${metaHtml}
        </div>
        <span class="device-entity-count">${sortedEntities.length}</span>
      </div>
      <div class="entity-list"></div>
    `;

    const list = card.querySelector('.entity-list');
    for (const [entityId, entityData] of sortedEntities) {
      list.appendChild(createEntityRow(entityId, entityData));
    }

    return card;
  }

  // ── Domain filter buttons ─────────────────────────────────────────────────
  function buildDomainFilters() {
    const domains = [...new Set(Object.values(states).map(d => d.domain))].sort();
    const bar = document.getElementById('domain-filter');
    for (const domain of domains) {
      const btn = document.createElement('button');
      btn.className = 'filter-btn';
      btn.dataset.domain = domain;
      btn.textContent = domain;
      btn.addEventListener('click', () => setDomainFilter(domain));
      bar.appendChild(btn);
    }
  }

  function setDomainFilter(domain) {
    activeDomain = domain;
    document.querySelectorAll('.filter-btn').forEach(b => {
      b.classList.toggle('active', b.dataset.domain === domain);
    });
    applyFilters();
  }

  // ── Filtering ─────────────────────────────────────────────────────────────
  function applyFilters() {
    const q = searchTerm.toLowerCase();
    let totalVisible = 0;

    document.querySelectorAll('.device-card').forEach(card => {
      const deviceId = card.dataset.deviceId;
      const device = devicesData[deviceId];
      if (!device) return;

      const deviceNameMatches = q && device.name.toLowerCase().includes(q);
      let visibleRows = 0;

      card.querySelectorAll('.entity-row').forEach(row => {
        const eid = row.dataset.entityId;
        const domain = row.dataset.domain;
        let show = true;

        if (activeDomain !== 'all' && domain !== activeDomain) {
          show = false;
        } else if (q) {
          if (!deviceNameMatches) {
            const edata = states[eid];
            const nameMatch = edata && edata.friendly_name.toLowerCase().includes(q);
            const idMatch = eid.toLowerCase().includes(q);
            if (!nameMatch && !idMatch) show = false;
          }
        }

        row.style.display = show ? '' : 'none';
        if (show) visibleRows++;
      });

      card.style.display = visibleRows > 0 ? '' : 'none';
      card.querySelector('.device-entity-count').textContent = visibleRows;
      totalVisible += visibleRows;
    });

    document.getElementById('entity-count').textContent = `${totalVisible} entit`;
  }

  // ── Grid render ───────────────────────────────────────────────────────────
  function renderGrid() {
    const grid = document.getElementById('grid');
    grid.innerHTML = '';

    const sortedDevices = Object.entries(devicesData).sort(([aId, a], [bId, b]) => {
      if (aId === '__no_device__') return 1;
      if (bId === '__no_device__') return -1;
      return a.name.localeCompare(b.name, 'cs');
    });

    for (const [deviceId, device] of sortedDevices) {
      if (!device.entities || Object.keys(device.entities).length === 0) continue;
      grid.appendChild(createDeviceCard(deviceId, device));
    }

    applyFilters();
  }

  // ── Live update ───────────────────────────────────────────────────────────
  function updateEntityRow(entityId, data, flash = true) {
    states[entityId] = data;
    const stateEl = document.getElementById(`state-${safeId(entityId)}`);
    if (!stateEl) return;

    stateEl.innerHTML = renderRowState(data);

    const row = stateEl.closest('.entity-row');
    if (row) {
      const wBadge = row.querySelector('.w-badge');
      if (wBadge) {
        wBadge.classList.toggle('contributing', isEntityActive(data.domain, data.state_raw));
      }
      if (flash) {
        row.classList.remove('updated');
        void row.offsetWidth;
        row.classList.add('updated');
      }
    }
  }

  // ── Log panel ─────────────────────────────────────────────────────────────
  function addLogEntry(msg) {
    const entries = document.getElementById('log-entries');
    const ts = new Date(msg.timestamp || Date.now()).toLocaleTimeString('cs-CZ');
    const el = document.createElement('div');
    el.className = 'log-entry';
    el.innerHTML = `
      <span class="log-ts">${ts}</span>
      <span class="log-entity">${msg.entity_id}</span><br>
      <span style="color:var(--text-muted)">${msg.friendly_name || ''}</span><br>
      <span class="log-old">${msg.old_state}</span>
      <span class="log-arrow"> → </span>
      <span class="log-new">${msg.new_state}</span>
    `;
    entries.prepend(el);
    if (entries.children.length > 200) entries.lastElementChild?.remove();

    if (!logOpen) {
      unreadCount++;
      const badge = document.getElementById('log-badge');
      badge.textContent = unreadCount > 99 ? '99+' : unreadCount;
      badge.style.display = 'block';
    }
  }

  function toggleLog() {
    logOpen = !logOpen;
    document.getElementById('log-panel').classList.toggle('open', logOpen);
    document.getElementById('overlay').classList.toggle('show', logOpen);
    if (logOpen) {
      unreadCount = 0;
      document.getElementById('log-badge').style.display = 'none';
    }
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  function connectWS() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    const ws = new WebSocket(`${proto}://${location.host}/ws`);
    const dot = document.getElementById('status-dot');

    ws.onopen = () => dot.classList.add('connected');
    ws.onclose = () => {
      dot.classList.remove('connected');
      setTimeout(connectWS, 3000);
    };

    ws.onmessage = (ev) => {
      const msg = JSON.parse(ev.data);
      if (msg.type === 'init') {
        for (const [eid, data] of Object.entries(msg.states)) {
          updateEntityRow(eid, data, false);
        }
        updateWeightDisplay(msg.total_weight || 0);
      } else if (msg.type === 'state_changed') {
        updateEntityRow(msg.entity_id, msg.data);
        addLogEntry({
          entity_id: msg.entity_id,
          friendly_name: msg.data.friendly_name,
          old_state: msg.old_state,
          new_state: msg.data.state_raw,
        });
        if (msg.total_weight !== undefined) updateWeightDisplay(msg.total_weight);
      }
    };
  }

  // ── Init ──────────────────────────────────────────────────────────────────
  buildDomainFilters();
  renderGrid();

  // Initial weight from template data (before WebSocket connects)
  {
    let w = 0;
    for (const d of Object.values(states)) {
      if (isEntityActive(d.domain, d.state_raw)) w += (d.weight || 1);
    }
    updateWeightDisplay(w);
  }

  document.getElementById('search').addEventListener('input', e => {
    searchTerm = e.target.value;
    applyFilters();
  });

  document.getElementById('weight-indicator').addEventListener('click', toggleWeightPanel);

  document.getElementById('log-toggle').addEventListener('click', toggleLog);
  document.getElementById('close-log').addEventListener('click', toggleLog);
  document.getElementById('overlay').addEventListener('click', toggleLog);
  document.getElementById('clear-log').addEventListener('click', () => {
    document.getElementById('log-entries').innerHTML = '';
  });

  connectWS();
</script>
</body>
</html>
